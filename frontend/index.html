<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!--
      Strict CSP: scripts and styles only from same origin. The single inline
      <script> below is allowed via 'unsafe-inline' because it's static (no
      DOM interpolation, no user input) and bundling it into main.js would
      reintroduce the theme-flash on cold load. All XHR/fetch must be same
      origin (vite proxies /api/* to the backend in dev). Frame embedding is
      blocked outright. No remote fonts / images / media.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    />
    <title>Octopus — Model Lab</title>
    <!-- Apply saved theme synchronously to prevent flash -->
    <script>
      try {
        var t = localStorage.getItem('octopus-theme');
        if (!t) {
          t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        if (t === 'dark') document.documentElement.classList.add('dark');
      } catch (e) {
        document.documentElement.classList.add('dark');
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
